name: Build Mod

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Valid Gradle Wrapper JAR
        run: |
          WRAPPER_DIR="gradle/wrapper"
          WRAPPER_JAR="$WRAPPER_DIR/gradle-wrapper.jar"
          WRAPPER_URL="https://services.gradle.org/distributions/gradle-8.8-wrapper.jar"

          if [ ! -f "$WRAPPER_JAR" ] || ! jar tf "$WRAPPER_JAR" >/dev/null 2>&1; then
            echo "⚠️ Detected missing or corrupted wrapper JAR. Downloading a fresh copy..."
            mkdir -p "$WRAPPER_DIR"
            curl -fL -o "$WRAPPER_JAR" "$WRAPPER_URL"
            echo "🚀 Downloaded successfully: $(ls -lh $WRAPPER_JAR)"
          else
            echo "✨ Wrapper JAR configuration is valid."
          fi

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystal-auto-clicker-jar
          path: build/libs/*.jar
          retention-days: 30
