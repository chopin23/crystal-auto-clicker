name: Build Mod

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Force Download Valid Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          rm -f gradle/wrapper/gradle-wrapper.jar
          echo "⬇️ Downloading authentic gradle-wrapper.jar..."
          curl -fL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar
          echo "✅ Done!"

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystal-auto-clicker-jar
          path: build/libs/*.jar
          retention-days: 30
