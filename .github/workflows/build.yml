name: Build Mod

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🔧 [ย้ายมาตรงนี้] ล้างและดึงไฟล์ JAR ใหม่ตั้งแต่ก้าวแรก ก่อนที่ Gradle Action จะชิงพัง
      - name: Ensure Valid Gradle Wrapper JAR
        run: |
          WRAPPER_DIR="gradle/wrapper"
          WRAPPER_JAR="$WRAPPER_DIR/gradle-wrapper.jar"
          WRAPPER_URL="https://services.gradle.org/distributions/gradle-8.8-wrapper.jar"

          echo "🧹 Cleaning and downloading official Gradle Wrapper JAR..."
          mkdir -p "$WRAPPER_DIR"
          rm -f "$WRAPPER_JAR"
          curl -fL -o "$WRAPPER_JAR" "$WRAPPER_URL"
          echo "🚀 Verified Wrapper JAR: $(ls -lh $WRAPPER_JAR)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystal-auto-clicker-jar
          path: build/libs/*.jar
          retention-days: 30
